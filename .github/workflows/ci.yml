name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-tests:
    name: Fast tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run fast test suite
        run: pytest -m "not capytaine" --junitxml=fast-tests.xml

      - name: Upload fast test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fast-tests-${{ matrix.os }}-py${{ matrix.python-version }}
          path: fast-tests.xml

  capytaine-tests:
    name: Capytaine tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Show environment diagnostics
        run: |
          python --version
          python -c "import platform; print(platform.platform())"
          python -c "import capytaine, numpy; print('capytaine', capytaine.__version__); print('numpy', numpy.__version__)"

      - name: Run capytaine test suite
        run: pytest -m "capytaine" --junitxml=capytaine-tests.xml

      - name: Upload capytaine test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capytaine-tests-${{ matrix.os }}-py${{ matrix.python-version }}
          path: capytaine-tests.xml
